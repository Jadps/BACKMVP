<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Password Recovery</title>
</head>
<body style="font-family: sans-serif; color: #333; line-height: 1.6;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 10px;">
        <h3 style="color: #007bff;">Password Recovery</h3>
        <p>We received a request to change your password.</p>
        <p>Click the following link to set a new password:</p>
        <p style="text-align: center; margin-top: 30px;">
            <a href="{{ResetLink}}" 
               style="background-color: #007bff; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; display: inline-block; font-weight: bold;">
               Recover my password
            </a>
        </p>
        <br />
        <p>If you did not request this change, you can ignore this email.</p>
        <p>Regards,<br />The MVP Team</p>
    </div>
</body>
</html>
