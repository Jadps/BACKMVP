services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mvp-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=${RABBIT_USER:-admin}
      - RabbitMq__Password=${RABBIT_PASSWORD:-admin_password}
      - Config__GotenbergUrl=http://gotenberg:3000
      - ASPNETCORE_ENVIRONMENT=Production
    env_file: .env
    depends_on:
      - rabbitmq
      - gotenberg
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  db-postgres:
    image: postgres:16
    container_name: dbmvp
    profiles: [ "local" ]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: mvp-pgadmin
    profiles: [ "local" ]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db-postgres

  rabbitmq:
    image: rabbitmq:3-management
    container_name: mvp-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBIT_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBIT_PASSWORD:-admin_password}
    ports:
      - "5672:5672"
      - "15672:15672"

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: mvp-gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--api-port=3000"
    ports:
      - "3000:3000"
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: mvp-proxy
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
      - ./dp-keys:/home/app/.aspnet/DataProtection-Keys
volumes:
  pgdata:
  dp-keys:
