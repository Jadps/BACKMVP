services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mvp-api
    restart: unless-stopped
    environment:
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=${RabbitMq__Username:-admin}
      - RabbitMq__Password=${RabbitMq__Password:-admin_password}
      - Config__GotenbergUrl=http://gotenberg:3000
      - ASPNETCORE_ENVIRONMENT=Production
    env_file: .env
    depends_on:
      - rabbitmq
      - gotenberg
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db-postgres:
    image: postgres:16
    container_name: dbmvp
    profiles: [ "local" ]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: mvp-pgadmin
    profiles: [ "local" ]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db-postgres

  rabbitmq:
    image: rabbitmq:3-management
    container_name: mvp-rabbitmq
    user: "rabbitmq"
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RabbitMq__Username:-admin}
      - RABBITMQ_DEFAULT_PASS=${RabbitMq__Password:-admin_password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "check_running" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: mvp-gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--api-port=3000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: mvp-proxy
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
      - ./dp-keys:/home/app/.aspnet/DataProtection-Keys
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  dp-keys:
  rabbitmq_data:
