$kind: http-request
name: 'Login - Missing Fields'
method: POST
url: '{{baseUrl}}/api/v1/auth/login'
order: 3000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: noauth
body:
  type: json
  content: |-
    {
      "Email": "",
      "Password": ""
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 401', function () {
          pm.response.to.have.status(401);
      });
