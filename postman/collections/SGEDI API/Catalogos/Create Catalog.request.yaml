$kind: http-request
name: 'Create Catalog'
method: POST
url: '{{baseUrl}}/api/v1/catalogs'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Catálogo de Productos",
      "description": "Catálogo principal de productos del sistema",
      "tenantId": "{{tenantId}}",
      "isActive": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 201', function () {
          pm.response.to.have.status(201);
      });

      pm.test('Response has catalogId', function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property('catalogId');
      });

      pm.test('Response has correct name', function () {
          const json = pm.response.json();
          pm.expect(json.name).to.equal('Catálogo de Productos');
      });

      pm.test('Response time is less than 2000ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      // Guardar catalogId automáticamente
      const json = pm.response.json();
      if (json.catalogId) {
          pm.collectionVariables.set('catalogId', json.catalogId);
          console.log('catalogId guardado:', json.catalogId);
      }
