$kind: http-request
name: 'Delete Catalog'
method: DELETE
url: '{{baseUrl}}/api/v1/catalogs/{{catalogId}}'
order: 6000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200 or 204', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });

      // Limpiar catalogId de la colección
      pm.collectionVariables.set('catalogId', '');
      console.log('catalogId eliminado de variables de colección');
