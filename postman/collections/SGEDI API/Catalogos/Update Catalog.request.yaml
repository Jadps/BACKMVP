$kind: http-request
name: 'Update Catalog'
method: PUT
url: '{{baseUrl}}/api/v1/catalogs/{{catalogId}}'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Catálogo de Productos Actualizado",
      "description": "Descripción actualizada del catálogo",
      "isActive": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Catalog name was updated', function () {
          const json = pm.response.json();
          pm.expect(json.name).to.equal('Catálogo de Productos Actualizado');
      });
