$kind: http-request
name: 'Register - Duplicate Email'
method: POST
url: '{{baseUrl}}/api/v1/onboarding'
order: 3000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: noauth
body:
  type: json
  content: |-
    {
      "EmpresaNombre": "Empresa Duplicada",
      "Dominio": "duplicada",
      "AdminEmail": "admin@sgedi.com",
      "AdminPassword": "Admin1234!",
      "AdminNombre": "Ana",
      "AdminPrimerApellido": "Martínez"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 400', function () {
          pm.response.to.have.status(400);
      });

      pm.test('Response has error details', function () {
          const json = pm.response.json();
          pm.expect(json).to.exist;
      });
