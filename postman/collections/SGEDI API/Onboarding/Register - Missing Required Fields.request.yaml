$kind: http-request
name: 'Register - Missing Required Fields'
method: POST
url: '{{baseUrl}}/api/v1/onboarding'
order: 2000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: noauth
body:
  type: json
  content: |-
    {
      "EmpresaNombre": "",
      "Dominio": "",
      "AdminEmail": "not-an-email",
      "AdminPassword": "123",
      "AdminNombre": "",
      "AdminPrimerApellido": ""
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 400', function () {
          pm.response.to.have.status(400);
      });

      pm.test('Response has validation errors', function () {
          const json = pm.response.json();
          pm.expect(json).to.exist;
      });
