$kind: http-request
name: 'Delete Tenant'
method: DELETE
url: '{{baseUrl}}/api/v1/tenants/{{tenantId}}'
order: 5000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 204 or 200', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
