$kind: http-request
name: 'Update Tenant'
method: PUT
url: '{{baseUrl}}/api/v1/tenants/{{tenantId}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Empresa Demo Actualizada",
      "plan": "premium",
      "isActive": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Tenant name was updated', function () {
          const json = pm.response.json();
          pm.expect(json.name).to.equal('Empresa Demo Actualizada');
      });
