$kind: http-request
name: 'Create User - Duplicate Email'
method: POST
url: '{{baseUrl}}/api/v1/usuarios'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "Email": "admin@sgedi.com",
      "Nombre": "Admin",
      "PrimerApellido": "Duplicado",
      "Password": "Admin1234!",
      "id": 1,
      "Roles": []
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 400', function () {
          pm.response.to.have.status(400);
      });

      pm.test('Response has error details', function () {
          const json = pm.response.json();
          pm.expect(json).to.exist;
      });
