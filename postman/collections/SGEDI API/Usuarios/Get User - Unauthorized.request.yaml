$kind: http-request
name: 'Get User - Unauthorized'
method: GET
url: '{{baseUrl}}/api/v1/usuarios'
order: 3000
auth:
  type: noauth
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 401', function () {
          pm.response.to.have.status(401);
      });
